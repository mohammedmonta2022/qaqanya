    <script type="module">

        const apiKey = ""; // سيتم حقنها من البيئة لتوليد الأسئلة

        // --- الأسئلة الافتراضية (عن القصيدة الخاقانية في التجويد) ---
        const defaultQuestions = [
            { text: "من هو ناظم القصيدة الخاقانية في التجويد؟", options: ["أبو مزاحم الخاقاني", "ابن الجزري", "الإمام الشاطبي", "الخليل بن أحمد"], answer: "أبو مزاحم الخاقاني" },
            { text: "ما هي الأهمية التاريخية للقصيدة الخاقانية؟", options: ["أول منظومة في علم التجويد", "أول منظومة في النحو", "أطول قصيدة في التجويد", "أول كتاب نثر في القراءات"], answer: "أول منظومة في علم التجويد" },
            { text: "كم عدد أبيات القصيدة الخاقانية؟", options: ["51 بيتاً", "100 بيت", "25 بيتاً", "109 أبيات"], answer: "51 بيتاً" },
            { text: "على أي حرف تنتهي قوافي القصيدة الخاقانية (ما هي قافيتها)؟", options: ["الراء (رائية)", "النون (نونية)", "الميم (ميمية)", "اللام (لامية)"], answer: "الراء (رائية)" },

            { text: "ما هو البحر الشعري الذي نُظمت عليه القصيدة الخاقانية؟", options: ["بحر الطويل", "بحر الرجز", "بحر البسيط", "بحر الكامل"], answer: "بحر الطويل" },
            { text: "كيف بدأ الخاقاني منظومته؟", options: ["أقول مقالاً معجباً لأولي الحجر", "يقول راجي عفو رب سامع", "بدأت ببسم الله في النظم أولا", "الحمد لله الذي أنزل القرآن"], answer: "أقول مقالاً معجباً لأولي الحجر" },
            { text: "ما معنى كلمة 'الحِجْر' في قوله: لأولي الحجر؟", options: ["العقول والألباب", "الحجارة", "الغرفة", "المنع"], answer: "العقول والألباب" },
            { text: "ما هو المصطلح الذي كان يطلق على علم التجويد في عصر الخاقاني؟", options: ["حسن الأداء", "علم القراءات", "علم الأصوات", "علم الترتيل"], answer: "حسن الأداء" },
            { text: "إلى أي مدينة يُنسب أبو مزاحم الخاقاني؟", options: ["بغداد", "دمشق", "القاهرة", "الكوفة"], answer: "بغداد" },
            { text: "أكمل عجز البيت: 'أقول مقالا معجبا لأولي الحجر ... '", options: ["ولا فخر إن الفخر يدعو إلى الكبر", "أبين فيه الحروف على القدر", "ليرضى به الله في السر والجهر", "نظمت به الأشعار في مدح خير مضر"], answer: "ولا فخر إن الفخر يدعو إلى الكبر" },
            { text: "قال الناظم: 'فأول علم الذكر إتقان حفظه ... ' أكمل الشطر الثاني:", options: ["ومعرفة باللحن من فيك تجويده", "ومعرفة الأجزاء والربع والحزب", "ومعرفة التفسير من غير تعقيد", "ومعرفة الأحكام في النفي والجزم"], answer: "ومعرفة باللحن من فيك تجويده" },
            { text: "حذر الناظم في قصيدته من الإفراط والمبالغة في نطق الحروف، وهذا يعرف بـ:", options: ["التعسف والتكلف", "الإظهار", "الإدغام", "الإمالة"], answer: "التعسف والتكلف" },
            { text: "من هو الإمام الذي تأثر بالخاقانية ونظم 'النونية' في التجويد؟", options: ["الإمام السخاوي", "الإمام الشاطبي", "الإمام الداني", "الإمام الطيبي"], answer: "الإمام السخاوي" },
            { text: "بماذا أمر الخاقاني القارئ في قوله: 'وزن حرفه بالعدل كوزن ... '؟", options: ["إعطاء الحروف حقها دون زيادة أو نقصان", "رفع الصوت عند القراءة", "الإسراع في التلاوة", "تغيير الحركات"], answer: "إعطاء الحروف حقها دون زيادة أو نقصان" },
            { text: "ما هو الخطأ الذي حذر منه الناظم عند النطق بالهمزة؟", options: ["التهوع (الضغط الزائد المزعج)", "تسهيلها دائماً", "حذفها", "إبدالها ألفاً"], answer: "التهوع (الضغط الزائد المزعج)" },
            { text: "ركزت القصيدة الخاقانية بشكل أساسي على:", options: ["الجانب العملي والأداء الصوتي للتلاوة", "أحكام المواريث", "أسباب النزول", "تفسير الآيات"], answer: "الجانب العملي والأداء الصوتي للتلاوة" },
            { text: "اللحن الجلي في التجويد، والذي حذر منه العلماء، يقصد به:", options: ["الخطأ الواضح الذي يخل بالمعنى أو الإعراب", "ترك الغنة", "قصر المد", "عدم إخراج الحرف من مخرجه الدقيق"], answer: "الخطأ الواضح الذي يخل بالمعنى أو الإعراب" },
            { text: "ما هو الاسم الكامل للناظم أبي مزاحم الخاقاني؟", options: ["موسى بن عبيد الله بن يحيى الخاقاني", "محمد بن محمد بن محمد بن الجزري", "القاسم بن فيره الشاطبي", "عثمان بن سعيد الداني"], answer: "موسى بن عبيد الله بن يحيى الخاقاني" },
            { text: "من الأبيات التي تدل على فضل قراءة القرآن في القصيدة: 'فإن أنت حققت القراءة فاحذر الـ ... '", options: ["الزيادة فيها وسل العون من ربي", "اللحن الخفي", "الرياء", "النقصان"], answer: "الزيادة فيها وسل العون من ربي" },
            { text: "هل فصّل الخاقاني مخارج الحروف جميعها في قصيدته كما فعل ابن الجزري لاحقاً؟", options: ["لا، بل أورد إشارات وتوجيهات عامة للأداء", "نعم فصّلها بدقة", "نعم، ذكرها في آخر 10 أبيات", "لم يذكر التجويد أصلاً"], answer: "لا، بل أورد إشارات وتوجيهات عامة للأداء" },
            { text: "قال الناظم: 'أيا قارئ القرآن أحسن ... '", options: ["أداءه", "تفسيره", "ترتيله", "حفظه"], answer: "أداءه" },
            { text: "ما هو الحرف الذي خصه الناظم بالتحذير من ضياعه بين الإطباق؟", options: ["حروف الإطباق بشكل عام (ص ض ط ظ)", "حرف الهمزة", "حرف النون", "حرف الميم"], answer: "حروف الإطباق بشكل عام (ص ض ط ظ)" },
            { text: "أي من هذه الصفات أشار إليها الخاقاني في قصيدته؟", options: ["الهمس والجهر والإطباق", "التفشي فقط", "الاستطالة فقط", "الصفير فقط"], answer: "الهمس والجهر والإطباق" },
            { text: "ما معنى الإدغام الذي يشير إليه علماء التجويد؟", options: ["إدخال حرف ساكن في متحرك بحيث يصيران حرفاً واحداً مشدداً", "إخراج الحرف من مخرجه", "تطويل الصوت", "إخفاء الحرف"], answer: "إدخال حرف ساكن في متحرك بحيث يصيران حرفاً واحداً مشدداً" },
            { text: "يُعتبر قول الخاقاني: 'ولا تفرط في المد' إشارة إلى:", options: ["الالتزام بمقادير المدود وتجنب التمطيط المذموم", "ترك المدود تماماً", "مد جميع الحروف", "مد العوض فقط"], answer: "الالتزام بمقادير المدود وتجنب التمطيط المذموم" },
            { text: "في أي عام توفي الإمام الخاقاني؟", options: ["325 هـ", "590 هـ", "833 هـ", "1440 هـ"], answer: "325 هـ" },
            { text: "ما هو العلم الذي تعتبر الخاقانية شرارته الأولى؟", options: ["علم التجويد", "علم الحديث", "علم الفقه", "علم التفسير"], answer: "علم التجويد" },
            { text: "يقول الخاقاني محذراً من تحريف القرآن: 'وما لزم الإدغام فادغمه ... '", options: ["مبيناً", "مخفياً", "مظهراً", "مسرعاً"], answer: "مبيناً" },
            { text: "تعتبر القصيدة الخاقانية مرجعاً مهماً لأنها:", options: ["وثقت مصطلحات الأداء والتلاوة في القرن الثالث الهجري", "أول كتاب في الفقه المكي", "جمعت القراءات العشر", "شرحت الشاطبية"], answer: "وثقت مصطلحات الأداء والتلاوة في القرن الثالث الهجري" }
        ];

        // --- تهيئة Firebase ---
        async function initApp() {
            try {
                // إعدادات Firebase الخاصة بك للاستضافة والحفظ
                const firebaseConfig = {
                    apiKey: "AIzaSyCA4tJeZiDUKqEezjlW8UPS9Xv-EnHfwrc",
                    authDomain: "unity-msaed.firebaseapp.com",
                    projectId: "unity-msaed",
                    storageBucket: "unity-msaed.firebasestorage.app",
                    messagingSenderId: "237281388685",
                    appId: "1:237281388685:web:d9d143eeba27a5193b1ac4",
                    measurementId: "G-2QE1ZF3NNT"
                };
                
                appId = 'khaqaniyya-tajweed-app'; // معرف التطبيق داخل قاعدة بياناتك
                
                const firebaseApp = initializeApp(firebaseConfig);
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);

                // الدخول كمجهول للتمكن من الكتابة والقراءة من فايربيس الخاص بك
                await signInAnonymously(auth);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        await loadInitialData();
                    }
                });

                setupTheme();
            } catch (error) {
                console.error("Firebase init error:", error);
                renderError("عذراً، حدث خطأ أثناء الاتصال بقاعدة البيانات. (تأكد من تفعيل الدخول المجهول Anonymous Auth في إعدادات الفايربيس).");
            }
        }

        // --- جلب البيانات ---
        async function loadInitialData() {
            try {
                // جلب الأسئلة
                const questionsRef = doc(db, 'artifacts', appId, 'public', 'data', 'gamedata', 'questions');
                const docSnap = await getDoc(questionsRef);
                
                if (docSnap.exists() && docSnap.data().list && docSnap.data().list.length > 0) {
                    state.questions = docSnap.data().list;
                } else {
                    // أول مرة، حفظ الأسئلة الافتراضية
                    await setDoc(questionsRef, { list: defaultQuestions });
                    state.questions = defaultQuestions;
                }

                // جلب الطلاب (للمشرف وللتحقق من الاسم لاحقاً)
                const usersColRef = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                const usersSnap = await getDocs(usersColRef);
                state.allUsers = [];
                usersSnap.forEach(doc => {
                    state.allUsers.push({ id: doc.id, ...doc.data() });
                });

                state.view = 'login';
                render();
            } catch (error) {
                console.error("Data load error:", error);
                renderError("حدث خطأ أثناء تحميل البيانات.");
            }
        }

        // --- وظائف مساعدة ---
        function setupTheme() {
            const toggleBtn = document.getElementById('themeToggle');
            // تحقق من التفضيل المحفوظ أو تفضيل النظام
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                state.darkMode = true;
            }
            
            toggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                state.darkMode = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', state.darkMode ? 'dark' : 'light');
            });
        }

        function triggerConfetti() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#065f46', '#d97706', '#10b981', '#fbbf24', '#ffffff']
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // --- التصيير (Rendering) ---
        const appContainer = document.getElementById('app');

        function render() {
            appContainer.innerHTML = '';
            switch (state.view) {
                case 'loading': renderLoading(); break;
                case 'login': renderLogin(); break;
                case 'studentDash': renderStudentDash(); break;
                case 'quiz': renderQuiz(); break;
                case 'adminDash': renderAdminDash(); break;
            }
        }

        function renderLoading() {
            appContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center space-y-4">
                    <i class="fa-solid fa-star-and-crescent text-4xl text-islamic-green dark:text-emerald-500 animate-spinSlow"></i>
                    <p class="text-lg font-amiri font-bold animate-pulse text-islamic-gold">جاري التجهيز...</p>
                </div>
            `;
        }

        function renderError(msg) {
            appContainer.innerHTML = `
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-center">
                    <strong class="font-bold">تنبيه!</strong>
                    <span class="block sm:inline">${escapeHTML(msg)}</span>
                    <button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">إعادة التحميل</button>
                </div>
            `;
        }

        // 1. شاشة الدخول
        function renderLogin() {
            appContainer.innerHTML = `
                <div class="bg-white dark:bg-islamic-darkCard w-full max-w-md p-8 rounded-2xl shadow-xl border-t-4 border-islamic-gold islamic-arch">
                    <div class="text-center mb-8">
                        <i class="fa-solid fa-mosque text-5xl text-islamic-green dark:text-emerald-500 mb-4"></i>
                        <h2 class="text-2xl font-bold font-amiri">بوابة الاختبار</h2>
                        <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">يرجى إدخال اسمك الرباعي للدخول</p>
                    </div>
                    
                    <form id="loginForm" class="space-y-6">
                        <div>
                            <input type="text" id="userNameInput" required placeholder="الاسم الرباعي (مثال: أحمد محمود علي حسن)" 
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-islamic-green dark:focus:ring-emerald-500 text-center text-lg font-bold">
                            <p id="loginError" class="text-red-500 text-sm mt-2 text-center hidden"></p>
                        </div>
                        <button type="submit" 
                            class="w-full bg-islamic-green hover:bg-emerald-800 dark:bg-emerald-600 dark:hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-lg transition-colors text-lg shadow-md">
                            دخول / اختبر <i class="fa-solid fa-arrow-left mr-2"></i>
                        </button>
                    </form>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', handleLogin);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const nameInput = document.getElementById('userNameInput').value.trim();
            const errorEl = document.getElementById('loginError');
            
            // تحقق من المشرف
            if (nameInput === SUPERVISOR_NAME) {
                state.view = 'adminDash';
                render();
                return;
            }

            // تحقق من أن الاسم يبدو رباعياً (يحتوي على 3 مسافات على الأقل)
            const parts = nameInput.split(' ').filter(p => p.length > 0);
            if (parts.length < 3) {
                errorEl.textContent = "يرجى إدخال اسم ثلاثي أو رباعي حقيقي.";
                errorEl.classList.remove('hidden');
                return;
            }

            errorEl.classList.add('hidden');
            
            // البحث عن المستخدم في القائمة المحملة
            const existingUser = state.allUsers.find(u => u.name === nameInput);
            
            if (existingUser) {
                state.user = existingUser;
                state.view = 'studentDash';
            } else {
                // مستخدم جديد
                state.user = { name: nameInput, score: 0, taken: false, id: Date.now().toString() + Math.random().toString(36).substr(2, 5) };
                state.view = 'quiz';
                state.currentQIndex = 0;
                state.currentScore = 0;
            }
            render();
        }

        // 2. شاشة الطالب (إذا اختبر مسبقاً)
        function renderStudentDash() {
            const percentage = Math.round((state.user.score / state.questions.length) * 100);
            let message = "";
            let icon = "";
            if (percentage >= 90) { message = "ممتاز! معرفة تاريخية رائعة."; icon = "fa-medal text-yellow-500"; }
            else if (percentage >= 70) { message = "جيد جداً! لديك إلمام جيد بالدولة القراخانية."; icon = "fa-thumbs-up text-blue-500"; }
            else { message = "حاول مرة أخرى لتحسين معلوماتك."; icon = "fa-book-open text-islamic-green"; }

            appContainer.innerHTML = `
                <div class="bg-white dark:bg-islamic-darkCard w-full max-w-lg p-8 rounded-2xl shadow-xl text-center border-t-4 border-islamic-green islamic-arch">
                    <h2 class="text-2xl font-bold font-amiri mb-2">أهلاً بك، ${escapeHTML(state.user.name)}</h2>
                    <p class="text-slate-600 dark:text-slate-400 mb-6">لقد قمت بإجراء الاختبار مسبقاً.</p>
                    
                    <div class="bg-slate-50 dark:bg-slate-700 rounded-xl p-6 mb-8 border border-slate-200 dark:border-slate-600">
                        <i class="fa-solid ${icon} text-5xl mb-4"></i>
                        <h3 class="text-4xl font-bold text-islamic-green dark:text-emerald-400 mb-2">${state.user.score} / ${state.questions.length}</h3>
                        <p class="text-lg font-bold">${message}</p>
                    </div>

                    <button id="retakeBtn" class="bg-islamic-gold hover:bg-yellow-600 text-white font-bold py-3 px-8 rounded-full transition-colors shadow-lg">
                        <i class="fa-solid fa-rotate-right ml-2"></i> إعادة الاختبار
                    </button>
                </div>
            `;

            document.getElementById('retakeBtn').addEventListener('click', () => {
                state.currentQIndex = 0;
                state.currentScore = 0;
                state.view = 'quiz';
                render();
            });
        }

        // 3. شاشة الاختبار (الأسئلة)
        function renderQuiz() {
            const q = state.questions[state.currentQIndex];
            // خلط الخيارات حتى لا تكون الإجابة الصحيحة في نفس المكان دائماً
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

            appContainer.innerHTML = `
                <div class="w-full max-w-2xl">
                    <!-- شريط التقدم -->
                    <div class="mb-6 flex items-center justify-between font-bold text-sm text-slate-500 dark:text-slate-400">
                        <span>السؤال ${state.currentQIndex + 1} من ${state.questions.length}</span>
                        <span>النتيجة: ${state.currentScore}</span>
                    </div>
                    <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2.5 mb-8">
                        <div class="bg-islamic-green dark:bg-emerald-500 h-2.5 rounded-full transition-all duration-300" style="width: ${((state.currentQIndex) / state.questions.length) * 100}%"></div>
                    </div>

                    <!-- بطاقة السؤال -->
                    <div class="bg-white dark:bg-islamic-darkCard p-6 sm:p-10 rounded-2xl shadow-xl mb-8">
                        <h3 class="text-xl sm:text-2xl font-bold font-amiri leading-relaxed text-center mb-8 text-islamic-green dark:text-emerald-400">
                            ${escapeHTML(q.text)}
                        </h3>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="optionsContainer">
                            ${shuffledOptions.map((opt, i) => `
                                <button class="btn-option w-full text-right p-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 hover:border-islamic-gold dark:hover:border-islamic-gold bg-slate-50 dark:bg-slate-800 font-bold focus:outline-none" data-val="${escapeHTML(opt)}">
                                    ${escapeHTML(opt)}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            const buttons = document.querySelectorAll('.btn-option');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    handleAnswer(this, q.answer, buttons);
                });
            });
        }

        function handleAnswer(selectedBtn, correctAnswer, allButtons) {
            // تعطيل جميع الأزرار لمنع النقر المزدوج
            allButtons.forEach(btn => btn.disabled = true);

            const selectedVal = selectedBtn.getAttribute('data-val');
            
            if (selectedVal === correctAnswer) {
                // إجابة صحيحة
                selectedBtn.classList.remove('border-slate-200', 'dark:border-slate-600', 'bg-slate-50', 'dark:bg-slate-800');
                selectedBtn.classList.add('bg-green-500', 'text-white', 'border-green-600', 'shadow-lg');
                triggerConfetti();
                state.currentScore++;
            } else {
                // إجابة خاطئة
                selectedBtn.classList.remove('border-slate-200', 'dark:border-slate-600', 'bg-slate-50', 'dark:bg-slate-800');
                selectedBtn.classList.add('bg-red-500', 'text-white', 'border-red-600', 'animate-shake');
                
                // تظليل الإجابة الصحيحة
                allButtons.forEach(btn => {
                    if (btn.getAttribute('data-val') === correctAnswer) {
                        btn.classList.remove('border-slate-200', 'dark:border-slate-600', 'bg-slate-50', 'dark:bg-slate-800');
                        btn.classList.add('bg-green-100', 'dark:bg-green-900', 'border-green-500', 'text-green-800', 'dark:text-green-200');
                    }
                });
            }

            // الانتقال للسؤال التالي بعد ثانية ونصف
            setTimeout(() => {
                state.currentQIndex++;
                if (state.currentQIndex < state.questions.length) {
                    render();
                } else {
                    finishQuiz();
                }
            }, 1500);
        }

        async function finishQuiz() {
            state.user.score = state.currentScore;
            state.user.taken = true;
            
            // حفظ في القاعدة
            try {
                // عرض شاشة تحميل بسيطة
                appContainer.innerHTML = `<div class="text-center font-bold text-xl"><i class="fa-solid fa-spinner fa-spin text-islamic-green"></i> جاري حفظ النتيجة...</div>`;
                
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', state.user.id);
                await setDoc(userRef, state.user);
                
                // تحديث الذاكرة المحلية
                const existingIndex = state.allUsers.findIndex(u => u.id === state.user.id);
                if(existingIndex > -1) state.allUsers[existingIndex] = state.user;
                else state.allUsers.push(state.user);

                state.view = 'studentDash';
                render();
            } catch (e) {
                console.error("Error saving score:", e);
                renderError("حدث خطأ أثناء حفظ النتيجة، لكن نتيجتك هي: " + state.currentScore);
            }
        }

        // 4. لوحة المشرف
        function renderAdminDash() {
            // ترتيب الطلاب حسب الدرجة
            const sortedUsers = [...state.allUsers].sort((a, b) => b.score - a.score);

            appContainer.innerHTML = `
                <div class="w-full max-w-4xl bg-white dark:bg-islamic-darkCard p-6 rounded-2xl shadow-xl">
                    <div class="flex justify-between items-center mb-8 border-b dark:border-slate-700 pb-4">
                        <h2 class="text-2xl font-bold font-amiri text-islamic-green dark:text-emerald-400">
                            <i class="fa-solid fa-crown text-islamic-gold mr-2"></i> لوحة المشرف
                        </h2>
                        <button onclick="location.reload()" class="text-sm bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 px-3 py-1 rounded">خروج</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <!-- قائمة الطلاب -->
                        <div>
                            <h3 class="text-lg font-bold mb-4"><i class="fa-solid fa-users mr-2"></i> نتائج الطلاب (${sortedUsers.length})</h3>
                            <div class="overflow-y-auto max-h-96 rounded-lg border border-slate-200 dark:border-slate-700">
                                <table class="w-full text-right text-sm">
                                    <thead class="bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 sticky top-0">
                                        <tr>
                                            <th class="p-3">الاسم</th>
                                            <th class="p-3">الدرجة</th>
                                            <th class="p-3">الحالة</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-200 dark:divide-slate-700">
                                        ${sortedUsers.length === 0 ? `<tr><td colspan="3" class="p-4 text-center text-slate-500">لا يوجد طلاب مختبرين بعد.</td></tr>` : 
                                          sortedUsers.map(u => `
                                            <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50">
                                                <td class="p-3 font-bold">${escapeHTML(u.name)}</td>
                                                <td class="p-3 text-islamic-green dark:text-emerald-400 font-bold">${u.score} / ${state.questions.length}</td>
                                                <td class="p-3">
                                                    <span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200">مكتمل</span>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- إضافة أسئلة بالذكاء الاصطناعي -->
                        <div class="bg-slate-50 dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700">
                            <h3 class="text-lg font-bold mb-4 text-islamic-gold"><i class="fa-solid fa-robot mr-2"></i> توليد أسئلة بالذكاء الاصطناعي</h3>
                            <p class="text-sm text-slate-600 dark:text-slate-400 mb-4">أضف أسئلة جديدة عن التاريخ القراخاني باستخدام نموذج Gemini.</p>
                            
                            <form id="aiForm" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-bold mb-1">عدد الأسئلة</label>
                                    <input type="number" id="aiCount" min="1" max="10" value="3" class="w-full p-2 rounded border border-slate-300 dark:border-slate-600 dark:bg-slate-700 focus:ring-2 focus:ring-islamic-gold outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold mb-1">مستوى الصعوبة</label>
                                    <select id="aiDiff" class="w-full p-2 rounded border border-slate-300 dark:border-slate-600 dark:bg-slate-700 focus:ring-2 focus:ring-islamic-gold outline-none">
                                        <option value="سهل">سهل</option>
                                        <option value="متوسط" selected>متوسط</option>
                                        <option value="صعب">صعب جداً</option>
                                    </select>
                                </div>
                                <button type="submit" id="aiBtn" class="w-full bg-islamic-dark dark:bg-slate-900 text-islamic-gold border border-islamic-gold hover:bg-islamic-gold hover:text-white font-bold py-2 rounded transition-colors flex justify-center items-center">
                                    <span>توليد وإضافة</span>
                                </button>
                                <p id="aiStatus" class="text-xs text-center font-bold mt-2 hidden"></p>
                            </form>
                            
                            <div class="mt-6 pt-4 border-t border-slate-200 dark:border-slate-700 text-sm">
                                <p>إجمالي الأسئلة الحالي في القاعدة: <span class="font-bold text-islamic-green dark:text-emerald-400">${state.questions.length}</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('aiForm').addEventListener('submit', handleAIGeneration);
        }

        async function handleAIGeneration(e) {
            e.preventDefault();
            const count = document.getElementById('aiCount').value;
            const diff = document.getElementById('aiDiff').value;
            const btn = document.getElementById('aiBtn');
            const statusEl = document.getElementById('aiStatus');

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> جاري التوليد...`;
            statusEl.classList.remove('hidden', 'text-red-500', 'text-green-500');
            statusEl.classList.add('text-blue-500');
            statusEl.textContent = "يتم الآن التواصل مع الذكاء الاصطناعي، قد يستغرق الأمر لحظات...";

            const promptText = `أنت خبير في علم التجويد والقراءات. قم بتوليد عدد ${count} أسئلة خيارات متعددة عن (القصيدة الخاقانية في التجويد) لأبي مزاحم الخاقاني أو عن أحكام التجويد العامة بمستوى صعوبة: ${diff}. 
يجب أن لا تكون الأسئلة مكررة وأن تكون دقيقة علمياً باللغة العربية.
كل سؤال يجب أن يحتوي على 4 خيارات وإجابة واحدة صحيحة (يجب أن تكون مطابقة تماماً لأحد الخيارات).`;

            try {
                // الاتصال بـ Gemini API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        text: { type: "STRING" },
                                        options: { type: "ARRAY", items: { type: "STRING" }, description: "يجب أن يحتوي على 4 نصوص دقيقة" },
                                        answer: { type: "STRING" }
                                    },
                                    required: ["text", "options", "answer"]
                                }
                            }
                        }
                    })
                });

                if (!response.ok) throw new Error("فشل الاتصال بالذكاء الاصطناعي");

                const result = await response.json();
                const textResult = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!textResult) throw new Error("صيغة استجابة غير صالحة");

                const newQuestions = JSON.parse(textResult);

                if (!Array.isArray(newQuestions) || newQuestions.length === 0) throw new Error("لم يتم توليد أسئلة صالحة");

                // تحديث قاعدة البيانات
                statusEl.textContent = "جاري حفظ الأسئلة في القاعدة...";
                const updatedList = [...state.questions, ...newQuestions];
                const questionsRef = doc(db, 'artifacts', appId, 'public', 'data', 'gamedata', 'questions');
                await updateDoc(questionsRef, { list: updatedList });

                // تحديث الحالة المحلية
                state.questions = updatedList;

                statusEl.classList.remove('text-blue-500');
                statusEl.classList.add('text-green-500');
                statusEl.textContent = `تمت إضافة ${newQuestions.length} سؤال بنجاح!`;
                
                // إعادة رسم الواجهة بعد ثانيتين
                setTimeout(() => {
                    render();
                }, 2000);

            } catch (err) {
                console.error("AI Gen Error:", err);
                statusEl.classList.remove('text-blue-500');
                statusEl.classList.add('text-red-500');
                statusEl.textContent = "حدث خطأ: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `توليد وإضافة`;
            }
        }

        // --- بدء التطبيق ---
        window.addEventListener('DOMContentLoaded', () => {
            // إضافة تأخير بسيط لإظهار شاشة التحميل بشكل جميل
            setTimeout(initApp, 500);
        });

    </script>
</body>
</html>
